  <line x1="40" y1="24" x2="40" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="46" y1="22" x2="46" y2="42" stroke="white" stroke-width="2" stroke-linecap="round"/>
